<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Martsan Uutiset</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1208;--paper:#f5f0e8;--cream:#ede7d6;--red:#c0392b;--muted:#6b5f4e;--rule:#2c2416;--tp:#c0392b}
body{background:var(--paper);color:var(--ink);font-family:"Source Serif 4",Georgia,serif;font-size:15px;line-height:1.6;min-height:100vh}

/* LOADING */
.ls{position:fixed;inset:0;background:var(--paper);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .5s;overflow:hidden}
.ls.out{opacity:0;pointer-events:none}
.ll{font-family:"Playfair Display",Georgia,serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:900;line-height:.9;text-align:center;opacity:0;animation:rv .5s ease 1s forwards}
.ll em{font-style:italic;color:var(--tp)}
.lr{display:flex;align-items:center;gap:.8rem;width:min(300px,80vw);opacity:0;animation:rv .5s ease 1.2s forwards}
.lr::before,.lr::after{content:"";flex:1;height:1px;background:var(--rule)}
.lr span{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.lb{width:min(200px,60vw);height:2px;background:#ddd;overflow:hidden;opacity:0;animation:rv .3s ease .9s forwards}
.lbi{height:100%;background:var(--tp);width:0%;transition:width .05s}
.lbi.go{width:100%;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.llas{position:absolute;top:0;left:-120%;width:40%;height:100%;opacity:0}
.llas.b1{background:linear-gradient(90deg,transparent,rgba(192,57,43,.25),rgba(255,200,180,.6),rgba(255,255,255,.8),rgba(255,200,180,.6),rgba(192,57,43,.25),transparent);animation:ll1 .6s ease-out .05s forwards}
.llas.b2{background:linear-gradient(90deg,transparent,rgba(150,30,20,.15),rgba(220,150,130,.45),rgba(255,230,220,.65),rgba(220,150,130,.45),rgba(150,30,20,.15),transparent);animation:ll1 .6s ease-out .2s forwards}
.llas.b3{background:linear-gradient(90deg,transparent,rgba(192,57,43,.1),rgba(255,180,160,.35),rgba(255,255,255,.55),rgba(255,180,160,.35),rgba(192,57,43,.1),transparent);animation:ll1 .6s ease-out .38s forwards}
@keyframes ll1{0%{left:-120%;opacity:1}100%{left:200%;opacity:1}}
@keyframes rv{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:none}}

/* ADMIN BAR */
.ab{background:var(--ink);color:#e8c070;padding:.4rem 1.5rem;display:flex;justify-content:center;align-items:center;gap:1rem;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.78rem;letter-spacing:.12em;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.ab button{background:var(--tp);color:#fff;border:none;padding:.2rem .8rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.74rem;letter-spacing:.1em}
.ab.cc{animation:rc 8s infinite}
@keyframes rc{0%,100%{background:var(--ink);color:#e8c070}12%{background:#8B0000;color:#ffcccc}25%{background:#C0392B;color:#fff5f5}37%{background:#922B21;color:#ffe0e0}50%{background:#6B0F1A;color:#ffd0d0}62%{background:#E74C3C;color:#fff}75%{background:#A93226;color:#ffeded}87%{background:#7B241C;color:#ffc8c8}}
.ab.cc button{animation:rbc 8s infinite}
@keyframes rbc{0%,100%,12%{background:#C0392B}25%{background:#6B0F1A}50%{background:#E74C3C}75%{background:#8B0000}}

/* MASTHEAD */
.masthead{border-top:4px solid var(--rule);border-bottom:1px solid var(--rule);padding:.35rem 1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:.68rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;background:var(--paper);position:relative;z-index:85}
.mlogin{background:var(--tp);color:#fff;border:none;padding:.15rem .6rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.62rem;letter-spacing:.1em}
.mlogin:hover{background:var(--rule)}
.nameplate{text-align:center;padding:1rem 1rem .5rem;border-bottom:3px double var(--rule);cursor:pointer;user-select:none}
.nameplate h1{font-family:"Playfair Display",Georgia,serif;font-size:clamp(2.2rem,7vw,5rem);font-weight:900;line-height:.9}
.nameplate h1 em{font-style:italic;color:var(--tp)}
.np-rule{display:flex;align-items:center;gap:.8rem;margin:.5rem 0 .2rem;justify-content:center}
.np-rule span{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.np-rule::before,.np-rule::after{content:"";flex:1;max-width:160px;height:1px;background:var(--rule)}
.tagline{font-style:italic;font-size:.82rem;color:var(--muted);margin-bottom:.3rem}

/* TICKER */
.ticker-wrap{overflow:hidden;white-space:nowrap;border-bottom:2px solid var(--rule)}
.ticker{background:var(--tp);color:#fff;padding:.35rem 0;display:block}
.ticker-label{display:inline-block;background:var(--ink);color:#fff;padding:0 .8rem;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.85rem;letter-spacing:.1em;margin-right:.8rem;vertical-align:middle}
.ticker-inner{display:inline-block;animation:tick 28s linear infinite;font-size:.75rem}
@keyframes tick{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

/* TOP BAR */
.top-bar{display:flex;justify-content:center;align-items:center;gap:.8rem;padding:.5rem 1.5rem;background:var(--cream);border-bottom:1px solid #c8bba0;position:relative;z-index:150;flex-wrap:wrap}
.dl-wrap,.lang-wrap{position:relative;display:inline-block}
.dl-main-btn{background:var(--ink);color:var(--paper);border:none;padding:.38rem 1.1rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.82rem;letter-spacing:.15em;display:flex;align-items:center;gap:.4rem;transition:background .2s}
.dl-main-btn:hover{background:var(--tp)}
.dl-arrow{font-size:.5rem;transition:transform .2s;display:inline-block}
.dl-main-btn.open .dl-arrow{transform:rotate(180deg)}
.dl-dropdown{position:absolute;top:calc(100% + 2px);left:0;background:var(--ink);min-width:160px;display:none;box-shadow:4px 4px 0 rgba(0,0,0,.25);border:1px solid #3a3020;z-index:300}
.dl-dropdown.open{display:block}
.dl-dropdown button{display:block;width:100%;background:none;border:none;border-bottom:1px solid #2e2418;color:var(--paper);padding:.45rem 1rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.78rem;letter-spacing:.12em;text-align:left;transition:background .15s}
.dl-dropdown button:last-child{border-bottom:none}
.dl-dropdown button:hover{background:var(--tp)}
.lang-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.32rem .8rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.78rem;letter-spacing:.12em;transition:all .15s}
.lang-btn:hover{border-color:var(--ink);color:var(--ink)}
.lang-dropdown{position:absolute;top:calc(100% + 2px);left:0;background:var(--paper);border:1px solid var(--rule);box-shadow:4px 4px 0 rgba(0,0,0,.15);min-width:140px;display:none;z-index:300}
.lang-dropdown.open{display:block}
.lang-option{display:block;width:100%;background:none;border:none;border-bottom:1px dashed #c8bba0;color:var(--ink);padding:.4rem .8rem;cursor:pointer;font-family:"Source Serif 4",Georgia,serif;font-size:.78rem;text-align:left;transition:background .15s}
.lang-option:last-child{border-bottom:none}
.lang-option:hover{background:var(--cream)}
.tbtn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.32rem .8rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.78rem;letter-spacing:.12em;transition:all .15s}
.tbtn:hover{border-color:var(--tp);color:var(--tp)}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(26,18,8,.65);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:var(--paper);border:2px solid var(--rule);padding:2rem;width:340px;max-width:92vw;box-shadow:6px 6px 0 var(--rule)}
.modal h2{font-family:"Playfair Display",Georgia,serif;font-size:1.3rem;font-weight:900;margin-bottom:.2rem}
.modal p.sub{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid #c8bba0}
.modal label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.2rem}
.modal input{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.45rem .6rem;font-family:"Source Serif 4",Georgia,serif;font-size:.9rem;color:var(--ink);outline:none;margin-bottom:.9rem}
.modal input:focus{border-color:var(--tp)}
.modal-err{color:var(--tp);font-size:.75rem;font-style:italic;min-height:1.1em;margin-bottom:.6rem}
.modal-btns{display:flex;gap:.6rem}
.btn-p{flex:1;background:var(--ink);color:var(--paper);border:none;padding:.55rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.95rem;letter-spacing:.12em}
.btn-p:hover{background:var(--tp)}
.btn-s{background:none;border:1px solid var(--muted);color:var(--muted);padding:.5rem .9rem;cursor:pointer;font-family:"Source Serif 4",Georgia,serif;font-size:.75rem}
.btn-s:hover{border-color:var(--ink);color:var(--ink)}

/* LARGE MODALS */
.big-modal{background:var(--paper);border:2px solid var(--rule);padding:1.5rem;box-shadow:6px 6px 0 var(--rule);max-height:80vh;overflow-y:auto;width:480px;max-width:95vw}
.big-modal h2{font-family:"Playfair Display",Georgia,serif;font-size:1.2rem;font-weight:900;margin-bottom:.6rem;border-bottom:1px solid var(--rule);padding-bottom:.4rem}
.msearch{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.35rem .6rem;font-family:"Source Serif 4",Georgia,serif;font-size:.82rem;color:var(--ink);outline:none;margin-bottom:.8rem}
.msearch:focus{border-color:var(--tp)}

/* USER ROWS */
.urow{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #c8bba0;flex-wrap:wrap;gap:.3rem}
.urow span{font-size:.85rem}
.ubadge{display:inline-block;font-size:.6rem;padding:.05rem .3rem;margin-left:.4rem;background:#1a5c2e;color:#fff;font-family:"Bebas Neue","Arial Narrow",sans-serif;letter-spacing:.08em}
.ub{background:var(--ink);color:var(--paper);border:none;padding:.2rem .7rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.72rem}
.ub.red{background:var(--tp)}
.ub.green{background:#1E8449}
.ub.dim{background:#555}
.ub.outline{background:none;border:1px solid var(--tp);color:var(--tp)}

/* MSG ROWS */
.mrow{padding:.5rem 0;border-bottom:1px dashed #c8bba0;cursor:pointer;display:flex;align-items:center;gap:.5rem}
.mrow-from{font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.8rem;letter-spacing:.1em;color:var(--ink);transition:color .15s;white-space:nowrap}
.mrow:hover .mrow-from{color:var(--tp)}
.mrow-sub{font-size:.75rem;color:var(--muted);font-style:italic;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 .4rem}
.mrow-del{background:var(--tp);color:#fff;border:none;cursor:pointer;font-size:.6rem;padding:.15rem .4rem;flex-shrink:0}
.mdetail{background:var(--cream);border:1px solid #c8bba0;padding:.8rem;margin-top:.3rem;font-size:.82rem;line-height:1.6;display:none}
.mdetail.open{display:block}

/* SEND MSG MODAL */
.send-modal{background:var(--paper);border:2px solid var(--rule);padding:2rem;width:360px;max-width:92vw;box-shadow:6px 6px 0 var(--rule)}
.send-modal h2{font-family:"Playfair Display",Georgia,serif;font-size:1.2rem;font-weight:900;margin-bottom:.2rem}
.send-modal p{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid #c8bba0}
.send-modal label{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.2rem}
.send-modal input,.send-modal textarea{width:100%;background:var(--cream);border:1px solid #b0a090;padding:.4rem .55rem;font-family:"Source Serif 4",Georgia,serif;font-size:.88rem;color:var(--ink);outline:none;display:block;margin-bottom:.7rem}
.send-modal input:focus,.send-modal textarea:focus{border-color:var(--tp)}
.send-modal textarea{resize:vertical;min-height:80px}

/* CONFIRM */
.confirm-bg{position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:600;display:flex;align-items:center;justify-content:center}
.confirm-box{background:var(--paper);border:2px solid var(--rule);padding:1.8rem;width:300px;max-width:90vw;box-shadow:5px 5px 0 var(--rule);text-align:center}
.confirm-box p{font-family:"Playfair Display",Georgia,serif;font-size:1.05rem;margin-bottom:1.4rem;line-height:1.4}
.confirm-btns{display:flex;gap:.8rem;justify-content:center}
.cbtn-yes{background:var(--tp);color:#fff;border:none;padding:.5rem 1.4rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.95rem;letter-spacing:.12em}
.cbtn-no{background:none;border:1px solid var(--muted);color:var(--muted);padding:.45rem 1rem;cursor:pointer;font-family:"Source Serif 4",Georgia,serif;font-size:.82rem}

/* FILTER BAR */
.filter-bar{max-width:1050px;margin:0 auto;padding:.6rem 1.2rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.filter-label{font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.68rem;letter-spacing:.15em;color:var(--muted)}
.filter-btn{background:none;border:1px solid #c8bba0;color:var(--ink);padding:.2rem .65rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.68rem;letter-spacing:.1em;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filter-btn.cat-urheilu:hover,.filter-btn.cat-urheilu.active{background:#3a7fd4;border-color:#3a7fd4;color:#fff}
.filter-btn.cat-kulttuuri:hover,.filter-btn.cat-kulttuuri.active{background:#a855c8;border-color:#a855c8;color:#fff}
.filter-btn.cat-koulu:hover,.filter-btn.cat-koulu.active{background:#2ea85a;border-color:#2ea85a;color:#fff}
.filter-btn.cat-muut:hover,.filter-btn.cat-muut.active{background:#d4820a;border-color:#d4820a;color:#fff}
.filter-search-wrap{margin-left:auto}
.filter-search{background:var(--cream);border:1px solid #c8bba0;padding:.22rem .6rem;font-family:"Source Serif 4",Georgia,serif;font-size:.78rem;color:var(--ink);outline:none;min-width:130px}
.filter-search:focus{border-color:var(--tp)}

/* GRID */
.container{max-width:1050px;margin:0 auto;padding:0 1.2rem}
.grid{display:grid;grid-template-columns:1fr 2px 2fr 2px 1fr;padding:1.2rem 0}
.divider{background:repeating-linear-gradient(to bottom,var(--rule) 0,var(--rule) 5px,transparent 5px,transparent 9px);margin:0 .7rem}
.col{padding:0 .9rem}
.sec-label{font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tp);border-bottom:2px solid var(--tp);padding-bottom:.18rem;margin-bottom:.7rem}
.cat-badge{display:inline-block;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.58rem;letter-spacing:.12em;padding:.08rem .4rem;margin-bottom:.3rem;color:#fff}
.cat-urheilu{background:#3a7fd4}.cat-kulttuuri{background:#a855c8}.cat-koulu{background:#2ea85a}.cat-muut{background:#d4820a}.cat-default{background:var(--muted)}
.pop-badge{display:inline-block;font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.58rem;letter-spacing:.12em;padding:.08rem .5rem;margin-bottom:.3rem;color:#fff;background:#8B0000;border:1px solid #C0392B;animation:ppulse 2s ease-in-out infinite}
@keyframes ppulse{0%,100%{opacity:1}50%{opacity:.7}}

/* CARDS */
.card{margin-bottom:1.1rem;padding-bottom:.9rem;border-bottom:1px dashed #b0a090;position:relative;cursor:pointer}
.card:last-child{border-bottom:none}
.card h3{font-family:"Playfair Display",Georgia,serif;font-size:.95rem;font-weight:700;line-height:1.2;margin-bottom:.2rem;transition:color .15s}
.card.lead h2{font-family:"Playfair Display",Georgia,serif;font-size:clamp(1.3rem,2.3vw,1.9rem);font-weight:900;line-height:1.1;margin-bottom:.35rem;transition:color .15s}
.card:hover h2,.card:hover h3{color:var(--tp)}
.card .excerpt{font-size:.78rem;color:#3d3020;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.byline{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.25rem}
.hint{font-size:.65rem;color:var(--tp);text-transform:uppercase;letter-spacing:.1em;margin-top:.35rem;display:inline-block}
.card-meta{display:flex;gap:.8rem;align-items:center;margin-top:.25rem}
.views,.readtime{font-size:.6rem;color:var(--muted);letter-spacing:.06em}
.like-btn{background:none;border:none;cursor:pointer;font-size:.72rem;color:var(--muted);padding:0;transition:color .15s}
.like-btn:hover,.like-btn.liked{color:var(--tp)}
.card-thumb{width:100%;max-height:140px;object-fit:cover;margin-bottom:.5rem;display:block}
.del-btn{background:var(--tp);color:#fff;border:none;cursor:pointer;font-size:.65rem;padding:.2rem .5rem;position:absolute;top:0;right:0;display:none}
.edit-btn{background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:.65rem;padding:.2rem .5rem;position:absolute;top:0;right:3.2rem;display:none;font-family:"Bebas Neue","Arial Narrow",sans-serif;letter-spacing:.08em}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:.75rem;position:absolute;top:0;right:1.8rem;color:var(--muted);padding:.1rem .2rem;display:none;transition:color .15s}
.bookmark-btn:hover,.bookmark-btn.bookmarked{color:var(--tp)}
.admin-on .del-btn,.admin-on .edit-btn{display:block}
.admin-on .bookmark-btn{display:block;right:5rem}
.logged-in .bookmark-btn{display:block}
.empty{font-style:italic;font-size:.78rem;color:#b0a090;text-align:center;padding:1.5rem .5rem;border:1px dashed #c8bba0}
.divh{border:none;border-top:2px solid var(--rule);margin:1rem 0}
.skeleton{background:linear-gradient(90deg,#e8e0d0 25%,#f0e8d8 50%,#e8e0d0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:2px;display:block;margin-bottom:.5rem}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ARTICLE */
.art-wrap{max-width:680px;margin:0 auto;padding:1.5rem 1.2rem 2rem}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;border:none;background:none;padding:.4rem 0;margin-bottom:1.8rem;border-bottom:1px solid transparent;transition:color .15s,border-color .15s}
.back-btn:hover{color:var(--tp);border-bottom-color:var(--tp)}
.art-badge{font-family:"Bebas Neue","Arial Narrow",sans-serif;font-size:.68rem;letter-spacing:.2em;color:#fff;padding:.18rem .6rem;display:inline-block;margin-bottom:.9rem}
.art-title{font-family:"Playfair Display",Georgia,serif;font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:900;line-height:1.05;margin-bottom:.9rem}
.art-byline{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding-bottom:1rem;margin-bottom:1.5rem;border-bottom:2px solid var(--rule);display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.art-like-btn,.art-bm-btn,.art-edit-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:.2rem .6rem;cursor:pointer;font-size:.7rem;transition:all .15s}
.art-like-btn:hover,.art-like-btn.liked,.art-bm-btn:hover,.art-bm-btn.bookmarked{background:var(--tp);border-color:var(--tp);color:#fff}
.art-edit-btn{display:none;font-family:"Bebas Neue","Arial Narrow",sans-serif;letter-spacing:.1em}
.art-edit-btn:hover{background:var(--tp);border-color:var(--tp);color:#fff}
.admin-on .art-edit-btn{display:inline-block}
.art-bm-btn{display:none}
.logged-in .art-bm-btn,.admin-on .art-bm-btn{display:inline-block}
.art-hero{width:100%;max-height:420px;object-fit:cover;margin-bottom:1.5rem;display:block}
.art-hero-video{width:100%;max-height:420px;margin-bottom:1.5rem;display:block;background:#000}
.art-body{font-size:1rem;line-height:1.82;color:#2c2416;hyphens:auto}
.art-body p{margin-bottom:1.2em}
.art-body p:first-child::first-letter{font-family:"Playfair Display",Georgia,serif;font-size:3.5em;font-weight:900;float:left;line-height:.75;margin:.05em .1em 0 0;color:var(--tp)}
.art-end{border:none;border-top:3px double var(--rule);margin:2rem 0 1.2rem}
.art-del-btn{background:var(--tp);color:#fff;border:none;font-size:.78rem;padding:.5rem 1.2rem;cursor:pointer;font-family:"Bebas Neue","Arial Narrow",sans-serif;letter-spacing:.1em;display:none}
.admin-on .art-del-btn{display:inline-block}
.related-section{max-width:680px;margin:0 auto 2rem;padding:0 1.2rem}

function attachEvents(){
  function on(id,fn){var e=document.getElementById(id);if(e)e.addEventListener("click",fn);}
  function rf(id,v){var e=document.getElementById(id);if(e){e.focus();try{e.setSelectionRange(v.length,v.length);}catch(x){}}}

  // Confirm
  on("cy",function(){
    if(!confirmP)return;
    var id=confirmP.id,gb=confirmP.back;
    confirmP=null;
    articles=articles.filter(function(a){return a.id!==id;});
    saveArticles(articles);
    if(gb)page="front";
    render();
  });
  on("cn",function(){confirmP=null;render();});
  on("errd",function(){errMsg="";render();});

  // Lang
  on("lang-btn",function(e){e.stopPropagation();showLang=!showLang;render();});
  on("lang-fi",function(){lang="fi";showLang=false;render();});
  on("lang-en",function(){lang="en";showLang=false;render();});
  on("lang-sv",function(){lang="sv";showLang=false;render();});

  // Install dropdown
  on("dl-btn",function(e){
    e.stopPropagation();
    var b=document.getElementById("dl-btn"),d=document.getElementById("dl-dd");
    if(!b||!d)return;
    var op=!d.classList.contains("open");
    d.classList.toggle("open");b.classList.toggle("open");
    if(op)setTimeout(function(){

  on("rcbtn",function(){showReg=false;render();});

  // Logout
  function doLogout(){admin=false;loggedIn=false;cu="";sessStart=null;showEditor=false;showInbox=false;showMod=false;showMsgs=false;showSend=false;showBm=false;showProf=false;openMsg=null;fCat="";fSearch="";editId=null;pendMedia=[];render();}
  on("do-logout",doLogout);on("logout2",doLogout);

  // Admin buttons
  on("open-inbox",function(){showInbox=true;render();});on("close-inbox",function(){showInbox=false;render();});
  on("open-msgs",function(){showMsgs=true;render();});on("close-msgs",function(){showMsgs=false;openMsg=null;render();});
  on("open-mod",function(){showMod=true;render();});on("close-mod",function(){showMod=false;render();});
  on("open-bm",function(){showBm=true;render();});on("close-bm",function(){showBm=false;render();});
  on("open-send",function(){showSend=true;render();});on("cancel-send",function(){showSend=false;render();});
  on("open-prof",function(){showProf=true;render();});on("close-prof",function(){showProf=false;render();});

  // Theme
  on("th-red",function(){applyTheme("red");render();});
  on("th-blue",function(){applyTheme("blue");render();});
  on("th-green",function(){applyTheme("green");render();});

  // Msg search
  var msi=document.getElementById("ms-inp");
  if(msi)msi.addEventListener("input",function(){msgSearch=this.value;var v=this.value;render();rf("ms-inp",v);});
  var usi=document.getElementById("us-inp");
  if(usi)usi.addEventListener("input",function(){uSearch=this.value;var v=this.value;render();rf("us-inp",v);});
  var fsi=document.getElementById("fsrch");
  if(fsi){fsi.addEventListener("input",function(){fSearch=this.value;var v=this.value;render();rf("fsrch",v);});fsi.addEventListener("click",function(e){e.stopPropagation();});}

  // Filter cats
  on("fa",function(){fCat="";render();});
  CATS.forEach(function(c){on("fc-"+c,function(){fCat=(fCat===c?"":c);render();});});

  // Approve/reject pending
  getPending().forEach(function(a){
    on("appr-"+a.id,function(){
      a.col=a.col||"center";
      articles.push(a);
      saveArticles(articles);
      var p=getPending().filter(function(x){return x.id!==a.id;});
      savePending(p);
      render();
    });
    on("rej-"+a.id,function(){
      var p=getPending().filter(function(x){return x.id!==a.id;});
      savePending(p);
      render();
    });
  });

  // User management
  getUsers().filter(function(u){return u.user!==AU;}).forEach(function(u){
    on("mod-"+u.user,function(){var us=getUsers(),t=us.find(function(x){return x.user===u.user;});if(t)t.moderator=!t.moderator;saveUsers(us);render();});
    on("dp-"+u.user,function(){var us=getUsers(),t=us.find(function(x){return x.user===u.user;});if(t)t.direct=!t.direct;saveUsers(us);render();});
    on("du-"+u.user,function(){saveUsers(getUsers().filter(function(x){return x.user!==u.user;}));render();});
  });

  // Messages
  getMessages().forEach(function(m){
    on("mr-"+m.id,function(){openMsg=(openMsg===m.id?null:m.id);render();});
    on("md-"+m.id,function(){saveMessages(getMessages().filter(function(x){return x.id!==m.id;}));if(openMsg===m.id)openMsg=null;render();});
  });
  on("do-send",function(){
    var subj=(document.getElementById("ms-subj").value||"").trim();
    var txt=(document.getElementById("ms-body").value||"").trim();
    if(!txt)return;
    var msgs=getMessages();
    msgs.unshift({id:Date.now(),from:cu,subject:subj||"(ei aihetta)",text:txt,date:todayFI()});
    saveMessages(msgs);
    showSend=false;showNotif("Viesti lähetetty!");render();
  });

  // Comments
  getComments().forEach(function(c){
    on("cr-"+c.id,function(){openCmt[c.id]=!openCmt[c.id];render();});
    on("cd-"+c.id,function(){saveComments(getComments().filter(function(x){return x.id!==c.id;}));delete openCmt[c.id];render();});
  });
  on("c-sub",function(){
    var inp=document.getElementById("c-inp"),btn=document.getElementById("c-sub");
    if(!inp||!btn)return;
    var txt=inp.value.trim(),aid=parseInt(btn.getAttribute("data-aid"));
    if(!txt)return;
    var cmts=getComments();
    cmts.push({id:Date.now(),artId:aid,author:cu,text:txt,date:todayFI()});
    saveComments(cmts);render();
  });

  // Article like/bm/edit
  on("art-like",function(){var b=document.getElementById("art-like");if(b&&loggedIn){var id=parseInt(b.getAttribute("data-id"));toggleLike(id);var a=articles.find(function(x){return x.id===id;});if(a){if(isLiked(id))a.likes=(a.likes||0)+1;else a.likes=Math.max(0,(a.likes||1)-1);saveArticles(articles);}render();}else if(!loggedIn){showLogin=true;loginErr="";render();}});
  on("art-bm",function(){var b=document.getElementById("art-bm");if(b)toggleBm(parseInt(b.getAttribute("data-id")));});
  on("art-edit",function(){var b=document.getElementById("art-edit");if(b){editId=parseInt(b.getAttribute("data-id"));showEditor=true;page="front";render();}});
  on("art-del",function(){var b=document.getElementById("art-del");if(b)confirmP={id:parseInt(b.getAttribute("data-id")),back:true};render();});

  // Card like/bm/edit/open/del
  document.querySelectorAll("[data-like]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();if(loggedIn){var id=parseInt(b.getAttribute("data-like"));toggleLike(id);var a=articles.find(function(x){return x.id===id;});if(a){if(isLiked(id))a.likes=(a.likes||0)+1;else a.likes=Math.max(0,(a.likes||1)-1);saveArticles(articles);}render();}else{showLogin=true;loginErr="";render();}});});
  document.querySelectorAll("[data-bm]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();toggleBm(parseInt(b.getAttribute("data-bm")));});});
  document.querySelectorAll("[data-edit]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();editId=parseInt(b.getAttribute("data-edit"));showEditor=true;render();});});
  document.querySelectorAll("[data-del]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();confirmP={id:parseInt(b.getAttribute("data-del")),back:false};render();});});
  document.querySelectorAll("[data-open]").forEach(function(el){
    el.addEventListener("click",function(e){
      if(e.target.closest("[data-del]")||e.target.closest("[data-bm]")||e.target.closest("[data-edit]")||e.target.closest("[data-like]"))return;
      var id=parseInt(el.getAttribute("data-open"));page="article";openId=id;trackView(id);render();
    });
  });

  // Bookmarks modal clicks
  document.querySelectorAll("[id^='bmo-']").forEach(function(el){el.addEventListener("click",function(e){if(e.target.closest("[id^='bmd-']"))return;var id=parseInt(el.id.replace("bmo-",""));showBm=false;page="article";openId=id;trackView(id);render();});});
  document.querySelectorAll("[id^='bmd-']").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();var id=parseInt(b.id.replace("bmd-",""));var bms=getBm(),i=bms.indexOf(id);if(i!==-1)bms.splice(i,1);saveBm(bms);render();});});
  document.querySelectorAll("[id^='pb-']").forEach(function(el){el.addEventListener("click",function(){var id=parseInt(el.id.replace("pb-",""));showProf=false;page="article";openId=id;trackView(id);render();});});
  document.querySelectorAll("[id^='pc-']").forEach(function(el){el.addEventListener("click",function(){var aid=parseInt(el.id.replace("pc-",""));showProf=false;page="article";openId=aid;trackView(aid);render();});});
  document.querySelectorAll("[id^='ri-']").forEach(function(el){el.addEventListener("click",function(){var id=parseInt(el.id.replace("ri-",""));page="article";openId=id;trackView(id);render();});});

  // Media preview del
  document.querySelectorAll("[data-mi]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();var i=parseInt(b.getAttribute("data-mi"));pendMedia.splice(i,1);render();});});

  // Media file input — base64 (ei tarvita ulkoista tallennusta)
  var mf=document.getElementById("mf");
  if(mf){
    mf.addEventListener("change",function(){
      var files=Array.from(this.files);
      if(!files.length)return;
      showNotif("Ladataan mediaa…");
      var pending=files.length,done=0;
      files.forEach(function(f){
        var r=new FileReader();
        var t=f.type.startsWith("video")?"video":"image";
        r.onload=function(ev){
          pendMedia.push({type:t,url:ev.target.result});
          done++;
          if(done>=pending){showNotif("Media ladattu! ("+pendMedia.length+")");render();}
        };
        r.readAsDataURL(f);
      });
    });
  }

  on("mlogin",function(){showLogin=true;loginErr="";render();});
  on("ll",function(){showLogin=true;loginErr="";render();});
  on("nameplate",function(){page="front";render();});
  var atrig=document.getElementById("atrig");
  if(atrig)atrig.addEventListener("click",function(){tapN++;clearTimeout(tapT);if(tapN>=5){tapN=0;showLogin=true;loginErr="";render();}else tapT=setTimeout(function(){tapN=0;},2000);});
  on("back-btn",function(){page="front";render();});

  on("add-btn",function(){showEditor=!showEditor;if(!showEditor){editId=null;pendMedia=[];}render();});
  on("cancel-ed",function(){showEditor=false;editId=null;pendMedia=[];render();});
  on("pub-btn",function(){doPublish(false);});
  on("pub-direct",function(){doPublish(true);});
}

function doLogin(){
  var uEl=document.getElementById("lu"),pEl=document.getElementById("lp");
  if(!uEl||!pEl)return;
  var u=uEl.value.trim(),p=pEl.value;
  // Pääkäyttäjä
  if(u===AU&&p===AP){showLogin=false;admin=true;loggedIn=true;cu=u;sessStart=Date.now();render();return;}
  // Paikalliset käyttäjät
  var found=getUsers().find(function(x){return x.user===u&&x.pass===p;});
  if(found){showLogin=false;loggedIn=true;cu=u;loginErr="";sessStart=Date.now();render();return;}
  loginErr=T("loginErr");render();
}

function doRegister(){
  var uEl=document.getElementById("ru"),pEl=document.getElementById("rp"),p2El=document.getElementById("rp2");
  if(!uEl||!pEl||!p2El)return;
  var u=uEl.value.trim(),p=pEl.value,p2=p2El.value;
  if(!u||u.length<3){regErr="Käyttäjätunnus liian lyhyt (väh. 3 merkkiä).";render();return;}
  if(u===AU){regErr="Tämä tunnus on varattu.";render();return;}
  if(p.length<6){regErr="Salasana liian lyhyt (väh. 6 merkkiä).";render();return;}
  if(p!==p2){regErr="Salasanat eivät täsmää.";render();return;}
  var users=getUsers();
  if(users.find(function(x){return x.user===u;})){regErr="Tunnus on jo käytössä.";render();return;}
  users.push({user:u,pass:p,moderator:false,direct:false,date:todayFI()});
  saveUsers(users);
  showReg=false;showLogin=true;loginErr="";showNotif("Tunnus luotu! Kirjaudu sisään.");render();
}

function doPublish(direct){
  var title=(document.getElementById("et").value||"").trim();
  var body=(document.getElementById("eb").value||"").trim();
  if(!title){errMsg="Kirjoita otsikko.";render();return;}
  if(!body){errMsg="Kirjoita teksti.";render();return;}
  if(editId){
    var idx=articles.findIndex(function(a){return a.id===editId;});
    if(idx!==-1){
      articles[idx].title=title;
      articles[idx].author=(document.getElementById("ea").value||"").trim();
      articles[idx].sec=(document.getElementById("es").value||"");
      articles[idx].col=document.getElementById("ec").value;
      articles[idx].body=body;
      if(pendMedia.length)articles[idx].media=(articles[idx].media||[]).concat(pendMedia);
    }
    saveArticles(articles);showEditor=false;editId=null;pendMedia=[];showNotif("Artikkeli päivitetty!");render();return;
  }
  var media=pendMedia.slice();
  var art={id:getNextId(),title:title,author:(document.getElementById("ea").value||"").trim(),sec:(document.getElementById("es").value||""),col:document.getElementById("ec").value,body:body,date:todayFI(),media:media,likes:0};
  if(admin||direct){
    articles.push(art);saveArticles(articles);showEditor=false;pendMedia=[];page="article";openId=art.id;trackView(art.id);render();
  } else {
    var p=getPending();p.push(art);savePending(p);
    showEditor=false;pendMedia=[];showNotif(T("approved"));render();
  }
}

// ===== KÄYNNISTYS (Supabase Init) =====
try { var st = localStorage.getItem("mu_theme"); if(st) applyTheme(st); } catch(e) {}

async function initApp() {
  // Ladataan kaikki taulut rinnakkain, jotta sivu aukeaa nopeasti
  const [arts, usrs, pend, msgs, cmts, views, likes] = await Promise.all([
    supabase.from('articles').select('*'),
    supabase.from('users').select('*'),
    supabase.from('pending').select('*'),
    supabase.from('messages').select('*'),
    supabase.from('comments').select('*'),
    supabase.from('site_data').select('*').eq('id', 'views').single(),
    supabase.from('site_data').select('*').eq('id', 'likes').single()
  ]);

  // Siirretään Supabasetieto lokaaleihin muuttujiin (jos dataa löytyi)
  if (arts.data) articles = arts.data;
  if (usrs.data) globalUsers = usrs.data;
  if (pend.data) globalPending = pend.data;
  if (msgs.data) globalMsgs = msgs.data;
  if (cmts.data) globalCmts = cmts.data;
  if (views.data) globalViews = views.data.data;
  if (likes.data) globalLikes = likes.data.data;

  dataLoaded = true;
  
  // Loading screen piilotus
  var b=document.getElementById("lbi"); if(b) b.classList.add("go");
  setTimeout(function(){
    var ls=document.getElementById("ls");
    if(ls){ ls.classList.add("out"); setTimeout(function(){ ls.style.display="none"; }, 500); }
  }, 1000);

  // Piirretään UI vasta kun data on valmiina
  render();
}

// Käynnistetään sovellus
initApp();

// Autorefresh taustalla 30 sekunnin välein (vain artikkelit)
setInterval(async function() {
  const { data } = await supabase.from('articles').select('*');
  if (data && JSON.stringify(data) !== JSON.stringify(articles)) {
    articles = data;
    showNotif("Uusia artikkeleita päivitetty");
    render();
  }
}, 30000);
</script>
